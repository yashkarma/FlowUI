<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowUI - MVP Flowchart Maker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="Style.css">
    <script src="Script.js"></script>
</head>
<body class="flex h-screen w-screen bg-white overflow-hidden text-slate-800">

    <!-- Sidebar -->
    <aside class="w-72 bg-white border-r border-slate-200 shadow-sm flex flex-col z-20 shrink-0">
        <div class="p-4 border-b border-slate-200 flex items-center space-x-2">
            <i data-lucide="network" class="text-blue-500"></i>
            <h1 class="text-lg font-semibold tracking-tight">FlowUI</h1>
        </div>
        
        <div class="p-4 flex-1 overflow-y-auto">
            <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-4">Drag to Canvas</p>
            
            <div class="space-y-4">
                <!-- Rect -->
                <div class="drag-item p-3 border-2 border-slate-200 rounded-lg bg-slate-50 flex items-center hover:border-blue-400 hover:bg-blue-50" draggable="true" data-type="rect">
                    <div class="w-8 h-6 border-2 border-slate-400 bg-white rounded flex-shrink-0 mr-3"></div>
                    <span class="text-sm font-medium">Process (Rectangle)</span>
                </div>

                <!-- Pill -->
                <div class="drag-item p-3 border-2 border-slate-200 rounded-lg bg-slate-50 flex items-center hover:border-blue-400 hover:bg-blue-50" draggable="true" data-type="pill">
                    <div class="w-8 h-6 border-2 border-slate-400 bg-white rounded-full flex-shrink-0 mr-3"></div>
                    <span class="text-sm font-medium">Start/End (Pill)</span>
                </div>

                <!-- Diamond -->
                <div class="drag-item p-3 border-2 border-slate-200 rounded-lg bg-slate-50 flex items-center hover:border-blue-400 hover:bg-blue-50" draggable="true" data-type="diamond">
                    <div class="w-6 h-6 border-2 border-slate-400 bg-white transform rotate-45 mx-1 flex-shrink-0 mr-4"></div>
                    <span class="text-sm font-medium">Decision (Diamond)</span>
                </div>
            </div>

            <div class="mt-8">
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Instructions</p>
                <ul class="text-sm text-slate-500 space-y-2 list-disc pl-4">
                    <li><strong>Pan:</strong> Click & drag background</li>
                    <li><strong>Zoom:</strong> Scroll mouse wheel</li>
                    <li><strong>Connect:</strong> Drag from node dots</li>
                    <li><strong>Edit:</strong> Double-click node</li>
                    <li><strong>Delete:</strong> Select & press <kbd class="px-1 py-0.5 bg-slate-100 border rounded text-xs">Del</kbd></li>
                </ul>
            </div>
        </div>

        <div class="p-4 border-t border-slate-200">
            <button id="clear-btn" class="w-full flex items-center justify-center space-x-2 py-2 px-4 bg-red-50 text-red-600 rounded-md hover:bg-red-100 transition text-sm font-medium">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
                <span>Clear Canvas</span>
            </button>
        </div>
    </aside>

    <!-- Main Workspace -->
    <main id="workspace" class="flex-1 relative canvas-container">
        <!-- The scaled and translated layer -->
        <div id="canvas-layer" class="absolute top-0 left-0 w-full h-full transform-origin-top-left" style="transform: translate(0px, 0px) scale(1);">
            
            <!-- SVG Layer for Edges -->
            <svg id="edges-layer" class="absolute top-0 left-0 overflow-visible w-full h-full pointer-events-none z-0">
                <!-- Rendered edges go here -->
                <!-- Active drag line -->
                <path id="temp-edge" class="temp-path hidden" d="M0,0 L0,0"></path>
            </svg>

            <!-- HTML Layer for Nodes -->
            <div id="nodes-layer" class="absolute top-0 left-0 w-full h-full z-10 pointer-events-none">
                <!-- Rendered nodes go here. Children will have pointer-events: auto -->
            </div>

        </div>
        
        <!-- UI Controls Overlay -->
        <div class="absolute bottom-4 right-4 flex space-x-2 bg-white p-1 rounded-lg shadow-md border border-slate-200 z-30">
            <button id="zoom-out" class="p-2 hover:bg-slate-100 rounded text-slate-600" title="Zoom Out"><i data-lucide="minus"></i></button>
            <div class="flex items-center px-2 text-sm font-medium text-slate-500 w-16 justify-center" id="zoom-level">100%</div>
            <button id="zoom-in" class="p-2 hover:bg-slate-100 rounded text-slate-600" title="Zoom In"><i data-lucide="plus"></i></button>
            <div class="w-px bg-slate-200 mx-1"></div>
            <button id="reset-view" class="p-2 hover:bg-slate-100 rounded text-slate-600" title="Reset View"><i data-lucide="focus"></i></button>
        </div>
    </main>
</body>
</html>
